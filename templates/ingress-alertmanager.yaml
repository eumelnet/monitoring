{{- if index .Values "oauth2-proxy" "enabled" }}
{{- $fullname := printf "%s-%s" .Release.Name .Chart.Name }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullname }}-alertmanager
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "carbon-footprint.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: {{ .Release.Namespace }}-{{ $fullname }}-forward-auth@kubernetescrd,{{ .Release.Namespace }}-{{ $fullname }}-oauth-errors@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - host: alertmanager.t.eumel.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullname }}-alertmanager
                port:
                  number: 9093
  tls:
    - hosts:
        - alertmanager.t.eumel.de
      secretName: alertmanager-t-eumel-de
{{- end }}
